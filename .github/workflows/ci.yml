name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go format check
        shell: pwsh
        run: |
          $files = gofmt -l $(git ls-files '*.go')
          if ($files) {
            $files
            throw "Go files are not formatted. Run gofmt."
          }

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
